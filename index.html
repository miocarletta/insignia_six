<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>INSIGNIA SIX — Emergency Link</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #03060d; --card: #0d1623; --border: #1a2e48; --text: #c8daf0;
            --pena: #4a8edb; --pulu: #3ecf6a; --warn: #ff4444; --gps: #f1c40f;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'DM Sans', sans-serif; overflow: hidden; 
            height: 100vh; display: flex; flex-direction: column;
        }

        .screen { display: none; height: 100%; flex-direction: column; padding: 20px; overflow-y: auto; }
        .screen.active { display: flex; }
        
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-family: 'Syne', sans-serif; font-size: 2rem; color: #fff; }
        
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .card { 
            background: var(--card); border: 1px solid var(--border); 
            padding: 20px; border-radius: 15px; text-align: center; cursor: pointer;
        }
        .card:active { transform: scale(0.95); background: #162539; }

        .input-group { background: var(--card); padding: 15px; border-radius: 15px; border: 1px solid var(--border); margin-bottom: 15px; }
        input { 
            width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border); 
            padding: 12px; color: #fff; border-radius: 8px; margin-top: 10px; font-family: 'Share Tech Mono';
        }

        #callScreen { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: none; flex-direction: column; padding: 20px; }
        .chat-box { flex: 1; border: 1px solid var(--border); margin: 15px 0; border-radius: 15px; padding: 15px; overflow-y: auto; background: rgba(0,0,0,0.2); }
        
        /* GPS Banner */
        .gps-alert { background: rgba(241, 196, 15, 0.1); border: 1px solid var(--gps); color: var(--gps); padding: 10px; border-radius: 10px; font-size: 11px; font-family: 'Share Tech Mono'; margin-bottom: 10px; text-align: center; }
        .gps-link { color: var(--gps); text-decoration: underline; font-weight: bold; cursor: pointer; }

        .btn { 
            padding: 15px; border-radius: 10px; border: none; font-weight: bold; 
            cursor: pointer; font-family: 'Share Tech Mono'; text-transform: uppercase;
        }
        .btn-primary { background: var(--pena); color: white; width: 100%; }
        .btn-hangup { background: var(--warn); color: white; width: 100%; margin-top: 10px; }

        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .online { background: var(--pulu); box-shadow: 0 0 10px var(--pulu); }

        #toast { 
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%); 
            background: var(--pena); padding: 10px 20px; border-radius: 20px; 
            font-size: 12px; display: none; z-index: 1000;
        }
    </style>
</head>
<body>

<div id="toast"></div>

<div class="screen active" id="scr-login">
    <div class="header">
        <h1>COMM-LINK</h1>
        <p style="font-family:'Share Tech Mono'; font-size:10px; color:var(--pena)">[ SECURE EMERGENCY CHANNEL ]</p>
    </div>

    <div class="input-group">
        <label style="font-size: 11px; font-family: 'Share Tech Mono';">1. MASUKKAN KODE AKSES:</label>
        <input type="password" id="secret-key" placeholder="KODE RAHASIA" maxlength="15">
    </div>

    <p style="font-size: 11px; font-family: 'Share Tech Mono'; margin-bottom: 10px;">2. IDENTITAS OPERATIF:</p>
    <div class="grid" id="char-selection"></div>
</div>

<div class="screen" id="scr-lobby">
    <div class="input-group">
        <div id="my-info" style="font-weight: bold; font-family: 'Syne'; margin-bottom: 5px;"></div>
        <div id="my-gps" style="font-size: 10px; font-family: 'Share Tech Mono'; color: var(--gps);">GPS: MENCARI SINYAL...</div>
    </div>

    <div class="input-group">
        <label style="font-size: 11px; font-family: 'Share Tech Mono';">PANGGIL OPERATIF (ID):</label>
        <input type="text" id="target-peer" placeholder="CONTOH: I.S-02">
        <button class="btn btn-primary" style="margin-top:10px" onclick="makeCall()">MULAI HUBUNGAN</button>
    </div>

    <button onclick="logout()" style="background:none; border:none; color:var(--warn); font-family:'Share Tech Mono'; font-size:11px; cursor:pointer;">← LOGOUT & RESET</button>
</div>

<div id="callScreen">
    <div class="header">
        <h2 id="call-with">CONNECTING...</h2>
        <div id="call-timer" style="font-family:'Share Tech Mono'; color:var(--pulu)">00:00</div>
    </div>

    <div id="remote-gps" class="gps-alert" style="display:none">
        📍 LOKASI TERDETEKSI: <span class="gps-link" id="gps-map-url" onclick="">BUKA GOOGLE MAPS</span>
    </div>

    <div class="chat-box" id="chat-output"></div>
    <div style="display:flex; gap:10px;">
        <input type="text" id="chat-input" placeholder="Pesan..." style="margin-top:0">
        <button onclick="sendChat()" class="btn btn-primary" style="width:60px">></button>
    </div>
    <button class="btn btn-hangup" onclick="endCall()">PUTUSKAN HUBUNGAN</button>
</div>

<audio id="remoteAudio" autoplay playsinline></audio>

<script>
    const CHARS = {
        'MIO': 'I.S-01',
        'PENA': 'I.S-02',
        'VANIA': 'I.S-03',
        'MIZU': 'I.S-04',
        'PULU': 'I.S-05',
        'AL': 'I.S-06'
    };

    let peer, myId, myRole, secret, currentCall, currentConn, localStream;
    let myCoords = null;

    window.onload = () => {
        const grid = document.getElementById('char-selection');
        Object.keys(CHARS).forEach(role => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `<div style="font-family:'Syne'; font-weight:800;">${role}</div><div style="font-size:9px; opacity:0.5">${CHARS[role]}</div>`;
            div.onclick = () => initPeer(role);
            grid.appendChild(div);
        });
        startGPSWatch();
    };

    function startGPSWatch() {
        if ("geolocation" in navigator) {
            navigator.geolocation.watchPosition(pos => {
                myCoords = `${pos.coords.latitude},${pos.coords.longitude}`;
                if(document.getElementById('my-gps')) {
                    document.getElementById('my-gps').innerHTML = `GPS: LOKASI TERKUNCI`;
                }
                // Kirim update GPS jika sedang dalam koneksi aktif
                if (currentConn && currentConn.open) {
                    currentConn.send({ type: 'gps', coords: myCoords });
                }
            }, err => {
                console.error(err);
                if(document.getElementById('my-gps')) document.getElementById('my-gps').innerHTML = `GPS: ERROR/MATI`;
            }, { enableHighAccuracy: true });
        }
    }

    function initPeer(role) {
        secret = document.getElementById('secret-key').value.trim();
        if(!secret) return alert("Akses Ditolak: Masukkan Kode Rahasia!");
        
        myRole = role;
        myId = `${secret}-${CHARS[role]}`; 

        peer = new Peer(myId, {
            debug: 1,
            config: {'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }]}
        });

        peer.on('open', (id) => {
            document.getElementById('my-info').innerHTML = `<span style="color:var(--pena)">${role}</span> | ${CHARS[role]}`;
            showScreen('scr-lobby');
            showToast("Sistem Aktif");
        });

        peer.on('call', (call) => {
            if(confirm(`HUBUNGAN MASUK DARI ${call.peer.split('-').pop()}. TERIMA?`)) {
                navigator.mediaDevices.getUserMedia({audio: true}).then(stream => {
                    localStream = stream;
                    call.answer(stream);
                    handleCall(call);
                });
            }
        });

        peer.on('connection', (conn) => {
            currentConn = conn;
            handleData(conn);
            showScreen('callScreen');
        });

        peer.on('error', (err) => {
            if(err.type === 'unavailable-id') alert("ID ini sedang aktif di perangkat lain!");
            else showToast("Koneksi Gagal");
        });
    }

    async function makeCall() {
        const targetIdInput = document.getElementById('target-peer').value.trim().toUpperCase();
        const targetFullId = `${secret}-${targetIdInput}`;
        
        try {
            showToast("Menghubungi " + targetIdInput + "...");
            localStream = await navigator.mediaDevices.getUserMedia({audio: true});
            
            const call = peer.call(targetFullId, localStream);
            const conn = peer.connect(targetFullId);
            
            currentConn = conn;
            handleCall(call);
            handleData(conn);
        } catch (e) {
            alert("Akses Mikrofon Dibutuhkan!");
        }
    }

    function handleCall(call) {
        currentCall = call;
        document.getElementById('call-with').textContent = call.peer.split('-').pop();
        document.getElementById('callScreen').style.display = 'flex';
        
        call.on('stream', stream => {
            document.getElementById('remoteAudio').srcObject = stream;
        });
        call.on('close', endCall);
    }

    function handleData(conn) {
        conn.on('open', () => {
            if(myCoords) conn.send({ type: 'gps', coords: myCoords });
        });
        conn.on('data', data => {
            if(data.type === 'gps') {
                document.getElementById('remote-gps').style.display = 'block';
                document.getElementById('gps-map-url').onclick = () => {
                    window.open(`https://www.google.com/maps?q=${data.coords}`, '_blank');
                };
            } else {
                appendChat(data.role, data.msg, 'theirs');
            }
        });
    }

    function sendChat() {
        const inp = document.getElementById('chat-input');
        if(!inp.value || !currentConn) return;
        
        const data = { role: myRole, msg: inp.value };
        currentConn.send(data);
        appendChat('ME', inp.value, 'mine');
        inp.value = '';
    }

    function appendChat(sender, msg, type) {
        const out = document.getElementById('chat-output');
        const div = document.createElement('div');
        div.style.margin = '5px 0';
        div.style.textAlign = type === 'mine' ? 'right' : 'left';
        div.innerHTML = `<span style="font-size:9px; color:var(--pena)">${sender}:</span><br><span style="font-size:14px">${msg}</span>`;
        out.appendChild(div);
        out.scrollTop = out.scrollHeight;
    }

    function endCall() {
        if(currentCall) currentCall.close();
        if(currentConn) currentConn.close();
        if(localStream) localStream.getTracks().forEach(t => t.stop());
        document.getElementById('callScreen').style.display = 'none';
        document.getElementById('remote-gps').style.display = 'none';
        document.getElementById('chat-output').innerHTML = '';
        showToast("Hubungan Terputus");
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function showToast(m) {
        const t = document.getElementById('toast');
        t.textContent = m; t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3000);
    }

    function logout() {
        if(peer) peer.destroy();
        location.reload();
    }
</script>
</body>
</html>
